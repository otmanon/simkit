name: Release

# Triggered when you push a version tag like `v0.1.0`. The job builds
# sdist + wheel and uploads them to TestPyPI (always) and PyPI (only on
# non-pre-release tags). Authentication uses PyPI Trusted Publishing
# (OIDC) -- no API tokens are stored in the repo.
#
# One-time setup: register this repo as a Trusted Publisher on
# https://pypi.org/manage/account/publishing/ and
# https://test.pypi.org/manage/account/publishing/.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --wheel --outdir dist
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/simkit/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    # Skip pre-release tags like v0.1.0rc1, v0.1.0-alpha.1.
    if: ${{ !contains(github.ref_name, '-') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') }}
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/simkit/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
